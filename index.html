<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <main>
        <h1>Tic Tac Toe</h1>

        <!-- Player 2 selector (no emojis here) -->
        <form id="player2-selector">
            <label>
                Player 2:
                <select id="player2Select">
                    <option value="HUMAN">Human</option>
                    <option value="NAIVE">Naive Agent</option>
                </select>
            </label>
        </form>

        <!-- Board + status -->
        <div id="board" role="grid" aria-label="Tic Tac Toe board"></div>
        <div id="message" role="status" aria-live="polite"></div>

        <!-- Controls -->
        <button id="reset">Reset Game</button>
        <button id="exportEpsilon">Export Agent Table</button>
        <button id="importEpsilon">Import Agent Table</button>
        <input type="file" id="importEpsilonFile" accept=".json" style="display:none" />
        <span id="statusEpsilon"></span>
    </main>

    <script src="script.js"></script>
</body>

</html>
