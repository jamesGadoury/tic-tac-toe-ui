<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="
            default-src 'none';
            script-src 'self';
            style-src 'self';
            connect-src 'self';
            img-src 'self';
            font-src 'self';
          ">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <main>
        <h1>Tic Tac Toe</h1>

        <form id="player-selectors">
            <label>
                Player X:
                <select id="playerX">
                    <option value="HUMAN">Human (😁)</option>
                    <option value="NAIVE">Naive Agent (🤖)</option>
                    <option value="EPS_GREEDY">Epsilon‑Greedy Agent (🤖)</option>
                </select>
            </label>
            <label>
                Player O:
                <select id="playerO">
                    <option value="HUMAN">Human (😁)</option>
                    <option value="NAIVE">Naive Agent (🤖)</option>
                    <option value="EPS_GREEDY">Epsilon‑Greedy Agent (🤖)</option>
                </select>
            </label>
        </form>

        <div id="board" aria-label="Tic Tac Toe board" role="grid"></div>

        <div id="message" role="status" aria-live="polite"></div>

        <button id="reset">Reset Game</button>
        <button id="saveTable">Save Agent Table</button>
        <button id="loadTable">Load Agent Table</button>
    </main>

    <script type="module" src="script.js"></script>
</body>

</html>
