<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' blob:; script-src 'self'; style-src 'self';">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <main>
        <h1>Tic Tac Toe</h1>

        <!-- Mode selector -->
        <label for="modeSelect">
            Mode:
            <select id="modeSelect">
                <option value="play">Play vs Epsilon</option>
                <option value="sim">Simulate Naive vs Epsilon</option>
            </select>
        </label>

        <!-- Game area: board and (optional) log -->
        <div id="gameArea">
            <!-- Board -->
            <div id="boardWrapper">
                <div id="board" role="grid" aria-label="Tic Tac Toe board"></div>
                <div id="message" role="status" aria-live="polite"></div>
            </div>

            <!-- Simulation log -->
            <div id="simLogContainer">
                <strong>Simulation Log:</strong>
                <ul id="simLog"></ul>
            </div>

            <!-- new: running Win/Draw rate -->
            <div id="winRateContainer" style="display: none; margin-top: 0.5rem;">
                <strong>Win / Draw Rate:</strong>
                <span id="winRate">0.0%</span>
            </div>
        </div>

        <!-- Controls -->
        <div id="controls">
            <button id="actionBtn">Reset Game</button>
            <button id="exportEpsilon">Export Agent Table</button>
            <button id="importEpsilon">Import Agent Table</button>
            <label for="epsInput">ε:</label>
            <input type="number" id="epsInput" min="0" max="1" step="0.01" value="0.1" />
            <label for="lrInput">lr:</label>
            <input type="number" id="lrInput" min="0" max="1" step="0.01" value="0.5" />

            <span id="statusEpsilon"></span>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
